<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>nginx-lens hub — Observability Dashboard</title>
  <meta name="description" content="Real-time observability dashboard for nginx agents"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&family=Sora:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/dashboard.css"/>
</head>
<body>
  <div class="layout" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-title">OBSERVABILITY HUB</div>
        <div class="sidebar-sub">Nginx Engine v{{ version }}</div>
      </div>
      <nav class="sidebar-nav" id="nav"></nav>
      <div class="sidebar-foot">
        <a class="sidebar-link" href="https://github.com/rainysundaynight/nginx-lens/blob/main/docs/README.md" target="_blank" rel="noopener">
          <span>Документация</span>
          <svg class="icon-xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="sidebar-token" type="button" id="btn-token">
          <span class="sidebar-token-label">Active Token</span>
          <span class="sidebar-token-val" id="token-preview">—</span>
        </button>
      </div>
    </aside>
    <main class="main">
      <header class="header">
        <div class="header-search">
          <span class="header-search-label">SCAN:</span>
          <input type="text" id="search-input" placeholder="search upstream, IP, or CIDR..." autocomplete="off"/>
        </div>
        <div class="header-actions">
          <div class="header-meta hidden-sm">
            <span id="meta-refresh">AUTO-REFRESH: {{ refresh_interval }}S</span>
            <span class="header-status" id="meta-status">SYSTEM —</span>
          </div>
          <button class="btn-primary" type="button" id="btn-refresh">
            <svg class="icon-xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
            Обновить
          </button>
        </div>
      </header>
      <div class="banner hidden" id="error-banner" role="alert"></div>
      <div class="view" id="view"></div>
      <footer class="footer">
        <div id="footer-left">NGINX-LENS HUB V{{ version }} • BUILT FOR INFRASTRUCTURE PRECISION</div>
        <div class="footer-stats" id="footer-stats"></div>
      </footer>
    </main>
  </div>
  <dialog class="modal" id="token-modal">
    <form method="dialog" class="modal-box">
      <h2>Hub Token</h2>
      <p class="muted">X-Nginx-Lens-Token для доступа к API агентов и hub.</p>
      <input type="password" id="token-input" placeholder="lens_live_…" autocomplete="off"/>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="token-clear">Очистить</button>
        <button type="submit" class="btn-primary">Сохранить</button>
      </div>
    </form>
  </dialog>
  <script>window.NGINX_LENS_REFRESH = {{ refresh_interval }} * 1000;</script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
